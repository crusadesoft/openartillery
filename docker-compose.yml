services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: artillery
      POSTGRES_PASSWORD: artillery
      POSTGRES_DB: artillery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artillery -d artillery"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    # Anything in .env (XSOLLA_*, SHOP_DEV_MODE, etc.) gets forwarded
    # to the container without us having to enumerate it here. The
    # `environment:` block below overrides any duplicates.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 2567
      DATABASE_URL: postgres://artillery:artillery@postgres:5432/artillery
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-32chars-min}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-32chars-min}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:2567}
      LOG_LEVEL: info
    ports:
      - "2567:2567"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
