    <line x1="16" y1="11" x2="16" y2="13"/>
    <line x1="16" y1="19" x2="16" y2="21"/>
    <line x1="11" y1="16" x2="13" y2="16"/>
    <line x1="19" y1="16" x2="21" y2="16"/>
  </g>
  <circle cx="16" cy="16" r="1.4" fill="#ffba3a"/>
