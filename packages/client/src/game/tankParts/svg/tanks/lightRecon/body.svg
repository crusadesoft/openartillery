<!--
  "Light Recon" tank — light hull (W=40, no glacis, no skirt) + dome turret.
  Slate-grey primary #4a5560 with digital camo overlay.
  ViewBox y=-10 covers the dome cup; tread sits at y∈[12, 20].
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 -10 40 30"
     width="200" height="150">
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#637281"/>
      <stop offset="0.55" stop-color="#4a5560"/>
      <stop offset="1" stop-color="#282e34"/>
    </linearGradient>
    <linearGradient id="turret" x1="0" y1="-8.4" x2="0" y2="2.8" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6b7b8b"/>
      <stop offset="0.6" stop-color="#4f5b67"/>
      <stop offset="1" stop-color="#282e34"/>
    </linearGradient>
    <radialGradient id="wheel" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#6a6e7a"/>
      <stop offset="0.7" stop-color="#3a3d47"/>
      <stop offset="1" stop-color="#14161c"/>
    </radialGradient>
  </defs>

  <!-- Treads -->
  <rect x="0" y="12" width="40" height="8" fill="#0b0c10"/>
  <g fill="#1c1e26">
    <rect x="2" y="14" width="2" height="4"/><rect x="6" y="14" width="2" height="4"/>
    <rect x="10" y="14" width="2" height="4"/><rect x="14" y="14" width="2" height="4"/>
    <rect x="18" y="14" width="2" height="4"/><rect x="22" y="14" width="2" height="4"/>
    <rect x="26" y="14" width="2" height="4"/><rect x="30" y="14" width="2" height="4"/>
    <rect x="34" y="14" width="2" height="4"/>
  </g>
  <rect x="0" y="18" width="40" height="2" fill="rgba(0,0,0,0.6)"/>
  <rect x="4" y="13" width="32" height="1" fill="rgba(255,255,255,0.18)"/>

  <!-- Wheels (4) -->
  <g><circle cx="3.2" cy="16" r="3.6" fill="url(#wheel)"/>
     <circle cx="14.4" cy="16" r="3.6" fill="url(#wheel)"/>
     <circle cx="25.6" cy="16" r="3.6" fill="url(#wheel)"/>
     <circle cx="36.8" cy="16" r="3.6" fill="url(#wheel)"/></g>
  <g fill="#0a0b10">
    <circle cx="3.2" cy="16" r="1.62"/><circle cx="14.4" cy="16" r="1.62"/>
    <circle cx="25.6" cy="16" r="1.62"/><circle cx="36.8" cy="16" r="1.62"/>
  </g>
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="2.48" cy="15.28" r="0.648"/><circle cx="13.68" cy="15.28" r="0.648"/>
    <circle cx="24.88" cy="15.28" r="0.648"/><circle cx="36.08" cy="15.28" r="0.648"/>
  </g>

  <!-- Hull silhouette -->
  <path d="M 4 2 Q 4 0 8 0 L 36 0 L 36 12 L 4 12 Z" fill="url(#hull)"/>

  <!-- Digital camo overlay (clipped to hull) -->
  <g clip-path="inset(0% round 0)" opacity="0.55">
    <g fill="#2e3640">
      <rect x="6" y="2" width="1.5" height="1.5"/><rect x="9" y="3" width="1.5" height="1.5"/>
      <rect x="12" y="1.5" width="1.5" height="1.5"/><rect x="15" y="4" width="1.5" height="1.5"/>
      <rect x="18" y="2.5" width="1.5" height="1.5"/><rect x="22" y="3" width="1.5" height="1.5"/>
      <rect x="26" y="1.5" width="1.5" height="1.5"/><rect x="30" y="2" width="1.5" height="1.5"/>
      <rect x="33" y="3.5" width="1.5" height="1.5"/>
      <rect x="7" y="6" width="1.5" height="1.5"/><rect x="11" y="7" width="1.5" height="1.5"/>
      <rect x="14" y="5.5" width="1.5" height="1.5"/><rect x="20" y="6.5" width="1.5" height="1.5"/>
      <rect x="24" y="5" width="1.5" height="1.5"/><rect x="28" y="6" width="1.5" height="1.5"/>
      <rect x="32" y="7" width="1.5" height="1.5"/>
      <rect x="6" y="9" width="1.5" height="1.5"/><rect x="10" y="10" width="1.5" height="1.5"/>
      <rect x="13" y="9.5" width="1.5" height="1.5"/><rect x="17" y="10" width="1.5" height="1.5"/>
      <rect x="21" y="9" width="1.5" height="1.5"/><rect x="25" y="10" width="1.5" height="1.5"/>
      <rect x="29" y="9.5" width="1.5" height="1.5"/><rect x="33" y="10" width="1.5" height="1.5"/>
    </g>
  </g>

  <!-- Top highlight + bottom shadow -->
  <rect x="6" y="0" width="28" height="0.24" fill="#728394"/>
  <rect x="4" y="10" width="32" height="2" fill="rgba(0,0,0,0.45)"/>

  <!-- Mid seam -->
  <rect x="6" y="5.4" width="28" height="0.2" fill="rgba(0,0,0,0.35)"/>

  <!-- Accent stripe -->
  <rect x="8" y="7.44" width="24" height="0.32" fill="#202830"/>
  <rect x="8" y="7.76" width="24" height="0.12" fill="rgba(0,0,0,0.35)"/>

  <!-- Rivets -->
  <g fill="rgba(0,0,0,0.55)">
    <rect x="10" y="2" width="0.32" height="0.32"/>
    <rect x="18" y="2" width="0.32" height="0.32"/>
    <rect x="26" y="2" width="0.32" height="0.32"/>
    <rect x="34" y="2" width="0.32" height="0.32"/>
    <rect x="10" y="6.8" width="0.288" height="0.288"/>
    <rect x="18" y="6.8" width="0.288" height="0.288"/>
    <rect x="26" y="6.8" width="0.288" height="0.288"/>
    <rect x="34" y="6.8" width="0.288" height="0.288"/>
  </g>

  <!-- Hatch -->
  <circle cx="16.8" cy="2.64" r="2" fill="rgba(0,0,0,0.4)"/>
  <circle cx="16.8" cy="2.64" r="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.14"/>

  <!-- Antenna -->
  <line x1="10" y1="0" x2="10" y2="-5.4" stroke="#0a0a10" stroke-width="0.32"/>

  <!-- Stowage -->
  <rect x="4" y="4" width="6" height="6.6" fill="rgba(55,50,40,0.9)"/>
  <rect x="4" y="4" width="6" height="6.6" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
  <rect x="4" y="7.3" width="6" height="0.8" fill="rgba(0,0,0,0.5)"/>

  <!-- Dome turret -->
  <ellipse cx="17.6" cy="-2.8" rx="6.4" ry="5.6" fill="url(#turret)"/>
  <!-- Dome cup -->
  <ellipse cx="17.6" cy="-6.72" rx="2.048" ry="1.331" fill="url(#turret)"/>
  <ellipse cx="17.6" cy="-5.936" rx="1.741" ry="0.717" fill="rgba(0,0,0,0.35)"/>
  <!-- Turret highlight -->
  <ellipse cx="15.68" cy="-5.04" rx="3.584" ry="2.8" fill="rgba(255,255,255,0.35)"/>
  <!-- Turret base shadow -->
  <ellipse cx="17.6" cy="1.12" rx="4.864" ry="2.016" fill="rgba(0,0,0,0.35)"/>
  <!-- Bolts -->
  <g fill="rgba(0,0,0,0.55)">
    <circle cx="21.0" cy="-2.8" r="0.28"/>
    <circle cx="20.35" cy="-0.978" r="0.28"/>
    <circle cx="18.65" cy="0.149" r="0.28"/>
    <circle cx="16.55" cy="0.149" r="0.28"/>
    <circle cx="14.85" cy="-0.978" r="0.28"/>
    <circle cx="14.2" cy="-2.8" r="0.28"/>
    <circle cx="14.85" cy="-4.622" r="0.28"/>
    <circle cx="16.55" cy="-5.749" r="0.28"/>
    <circle cx="18.65" cy="-5.749" r="0.28"/>
    <circle cx="20.35" cy="-4.622" r="0.28"/>
  </g>
  <!-- Periscope -->
  <rect x="16.4" y="-7.84" width="2.4" height="0.88" fill="rgba(15,16,22,0.95)"/>
  <rect x="16.8" y="-6.84" width="1.6" height="0.28" fill="rgba(130,170,220,0.75)"/>
  <!-- Side mount -->
  <rect x="21.696" y="-3.44" width="1.28" height="1.2" fill="rgba(22,22,28,0.95)"/>
</svg>
