<!--
  "Desert Recon" tank — assault hull (W=50, glacis + skirt) + angular turret.
  Tan #c9a978 with chevron camo, dark brown accent.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 -8 50 29"
     width="250" height="145">
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="13" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe4a2"/>
      <stop offset="0.55" stop-color="#c9a978"/>
      <stop offset="1" stop-color="#6e5c42"/>
    </linearGradient>
    <linearGradient id="turret" x1="0" y1="-7.5" x2="0" y2="2.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff5ae"/>
      <stop offset="0.6" stop-color="#d9b681"/>
      <stop offset="1" stop-color="#6e5c42"/>
    </linearGradient>
    <radialGradient id="wheel" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#6a6e7a"/>
      <stop offset="0.7" stop-color="#3a3d47"/>
      <stop offset="1" stop-color="#14161c"/>
    </radialGradient>
  </defs>

  <!-- Treads -->
  <rect x="0" y="13" width="50" height="8" fill="#0b0c10"/>
  <g fill="#1c1e26">
    <rect x="2"  y="15" width="2" height="4"/><rect x="6"  y="15" width="2" height="4"/>
    <rect x="10" y="15" width="2" height="4"/><rect x="14" y="15" width="2" height="4"/>
    <rect x="18" y="15" width="2" height="4"/><rect x="22" y="15" width="2" height="4"/>
    <rect x="26" y="15" width="2" height="4"/><rect x="30" y="15" width="2" height="4"/>
    <rect x="34" y="15" width="2" height="4"/><rect x="38" y="15" width="2" height="4"/>
    <rect x="42" y="15" width="2" height="4"/>
  </g>
  <rect x="0" y="19" width="50" height="2" fill="rgba(0,0,0,0.6)"/>
  <rect x="4" y="14" width="42" height="1" fill="rgba(255,255,255,0.18)"/>

  <!-- Wheels (5) -->
  <g><circle cx="4" cy="17" r="3.6" fill="url(#wheel)"/>
     <circle cx="14.5" cy="17" r="3.6" fill="url(#wheel)"/>
     <circle cx="25" cy="17" r="3.6" fill="url(#wheel)"/>
     <circle cx="35.5" cy="17" r="3.6" fill="url(#wheel)"/>
     <circle cx="46" cy="17" r="3.6" fill="url(#wheel)"/></g>
  <g fill="#0a0b10">
    <circle cx="4" cy="17" r="1.62"/><circle cx="14.5" cy="17" r="1.62"/>
    <circle cx="25" cy="17" r="1.62"/><circle cx="35.5" cy="17" r="1.62"/>
    <circle cx="46" cy="17" r="1.62"/>
  </g>
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="3.28" cy="16.28" r="0.648"/><circle cx="13.78" cy="16.28" r="0.648"/>
    <circle cx="24.28" cy="16.28" r="0.648"/><circle cx="34.78" cy="16.28" r="0.648"/>
    <circle cx="45.28" cy="16.28" r="0.648"/>
  </g>

  <!-- Skirt -->
  <rect x="2" y="10.6" width="46" height="3.36" fill="#c9a978"/>
  <rect x="2" y="14" width="46" height="1" fill="rgba(0,0,0,0.35)"/>
  <g fill="rgba(0,0,0,0.55)">
    <rect x="6"  y="11.24" width="1.4" height="1.4"/>
    <rect x="18" y="11.24" width="1.4" height="1.4"/>
    <rect x="30" y="11.24" width="1.4" height="1.4"/>
    <rect x="42" y="11.24" width="1.4" height="1.4"/>
  </g>

  <!-- Hull silhouette w/ glacis (slopeW = 50*0.11=5.5) -->
  <path d="M 4 2 Q 4 0 8 0 L 42.5 0 L 46 13 L 4 13 Z" fill="url(#hull)"/>
  <!-- Glacis facet -->
  <path d="M 42.5 0 L 46 13 L 43.8 13 L 39.475 0 Z" fill="#907956"/>

  <!-- Chevron pattern (assault hull, angled stripes) -->
  <g opacity="0.55" fill="#8a6a3d">
    <path d="M 4 12 L 10.5 1 L 12 1 L 5.5 12 Z"/>
    <path d="M 14 12 L 20.5 1 L 22 1 L 15.5 12 Z"/>
    <path d="M 24 12 L 30.5 1 L 32 1 L 25.5 12 Z"/>
    <path d="M 34 12 L 40.5 1 L 42 1 L 35.5 12 Z"/>
  </g>

  <!-- Top highlight + bottom shadow + seam + accent + rivets -->
  <rect x="6" y="0" width="36.5" height="0.3" fill="#fff5ae"/>
  <rect x="4" y="11" width="42" height="2" fill="rgba(0,0,0,0.45)"/>
  <rect x="6" y="5.85" width="36.5" height="0.25" fill="rgba(0,0,0,0.35)"/>
  <rect x="8" y="8.06" width="32.5" height="0.4" fill="#4a3520"/>
  <rect x="8" y="8.46" width="32.5" height="0.15" fill="rgba(0,0,0,0.35)"/>
  <g fill="rgba(0,0,0,0.55)">
    <rect x="10" y="2" width="0.4" height="0.4"/>
    <rect x="18" y="2" width="0.4" height="0.4"/>
    <rect x="26" y="2" width="0.4" height="0.4"/>
    <rect x="34" y="2" width="0.4" height="0.4"/>
    <rect x="10" y="7.85" width="0.36" height="0.36"/>
    <rect x="18" y="7.85" width="0.36" height="0.36"/>
    <rect x="26" y="7.85" width="0.36" height="0.36"/>
    <rect x="34" y="7.85" width="0.36" height="0.36"/>
  </g>

  <!-- Hatch -->
  <circle cx="21" cy="2.86" r="2" fill="rgba(0,0,0,0.4)"/>
  <circle cx="21" cy="2.86" r="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.18"/>

  <!-- Antenna -->
  <line x1="10" y1="0" x2="10" y2="-5.85" stroke="#0a0a10" stroke-width="0.4"/>

  <!-- Stowage -->
  <rect x="4" y="4" width="6" height="7.15" fill="rgba(55,50,40,0.9)"/>
  <rect x="4" y="4" width="6" height="7.15" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
  <rect x="4" y="7.575" width="6" height="0.8" fill="rgba(0,0,0,0.5)"/>

  <!-- Angular hex turret (turretCx=22, turretCy=-2.5, rx=9, ry=5, hex angles offset 30°) -->
  <path d="M 29.794 0 L 22 2.5 L 14.206 0 L 14.206 -5 L 22 -7.5 L 29.794 -5 Z"
        fill="url(#turret)"/>

  <!-- Turret highlight + base shadow + bolts -->
  <ellipse cx="19.3" cy="-4.5" rx="5.04" ry="2.5" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="22" cy="1" rx="6.84" ry="1.8" fill="rgba(0,0,0,0.35)"/>
  <g fill="rgba(0,0,0,0.55)">
    <circle cx="28" cy="-2.5" r="0.35"/>
    <circle cx="26.85" cy="0.31" r="0.35"/>
    <circle cx="23.85" cy="2.07" r="0.35"/>
    <circle cx="20.15" cy="2.07" r="0.35"/>
    <circle cx="17.15" cy="0.31" r="0.35"/>
    <circle cx="16" cy="-2.5" r="0.35"/>
    <circle cx="17.15" cy="-5.31" r="0.35"/>
    <circle cx="20.15" cy="-7.07" r="0.35"/>
    <circle cx="23.85" cy="-7.07" r="0.35"/>
    <circle cx="26.85" cy="-5.31" r="0.35"/>
  </g>

  <!-- Periscope -->
  <rect x="20.5" y="-7" width="3" height="1.1" fill="rgba(15,16,22,0.95)"/>
  <rect x="21" y="-6" width="2" height="0.35" fill="rgba(130,170,220,0.75)"/>

  <!-- Side mount -->
  <rect x="27.76" y="-3.3" width="1.6" height="1.5" fill="rgba(22,22,28,0.95)"/>
</svg>
