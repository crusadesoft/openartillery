<!--
  "Black-Ops" tank — recon hull (W=42, glacis, no skirt, 5 wheels) + tall turret.
  Black #1a1a1c with urban camo, deep red accent.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 -12 42 32.6"
     width="210" height="163">
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="12.6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#232325"/>
      <stop offset="0.55" stop-color="#1a1a1c"/>
      <stop offset="1" stop-color="#0e0e0f"/>
    </linearGradient>
    <linearGradient id="turret" x1="0" y1="-10.886" x2="0" y2="3.36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#252528"/>
      <stop offset="0.6" stop-color="#1c1c1e"/>
      <stop offset="1" stop-color="#0e0e0f"/>
    </linearGradient>
    <radialGradient id="wheel" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#6a6e7a"/>
      <stop offset="0.7" stop-color="#3a3d47"/>
      <stop offset="1" stop-color="#14161c"/>
    </radialGradient>
  </defs>

  <!-- Treads -->
  <rect x="0" y="12.6" width="42" height="8" fill="#0b0c10"/>
  <g fill="#1c1e26">
    <rect x="2"  y="14.6" width="2" height="4"/><rect x="6"  y="14.6" width="2" height="4"/>
    <rect x="10" y="14.6" width="2" height="4"/><rect x="14" y="14.6" width="2" height="4"/>
    <rect x="18" y="14.6" width="2" height="4"/><rect x="22" y="14.6" width="2" height="4"/>
    <rect x="26" y="14.6" width="2" height="4"/><rect x="30" y="14.6" width="2" height="4"/>
    <rect x="34" y="14.6" width="2" height="4"/><rect x="38" y="14.6" width="2" height="4"/>
  </g>
  <rect x="0" y="18.6" width="42" height="2" fill="rgba(0,0,0,0.6)"/>
  <rect x="4" y="13.6" width="34" height="1" fill="rgba(255,255,255,0.18)"/>

  <!-- Wheels (5) -->
  <g><circle cx="3.36"  cy="16.6" r="3.6" fill="url(#wheel)"/>
     <circle cx="12.18" cy="16.6" r="3.6" fill="url(#wheel)"/>
     <circle cx="21"    cy="16.6" r="3.6" fill="url(#wheel)"/>
     <circle cx="29.82" cy="16.6" r="3.6" fill="url(#wheel)"/>
     <circle cx="38.64" cy="16.6" r="3.6" fill="url(#wheel)"/></g>
  <g fill="#0a0b10">
    <circle cx="3.36"  cy="16.6" r="1.62"/><circle cx="12.18" cy="16.6" r="1.62"/>
    <circle cx="21"    cy="16.6" r="1.62"/><circle cx="29.82" cy="16.6" r="1.62"/>
    <circle cx="38.64" cy="16.6" r="1.62"/>
  </g>
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="2.64"  cy="15.88" r="0.648"/><circle cx="11.46" cy="15.88" r="0.648"/>
    <circle cx="20.28" cy="15.88" r="0.648"/><circle cx="29.1"  cy="15.88" r="0.648"/>
    <circle cx="37.92" cy="15.88" r="0.648"/>
  </g>

  <!-- Hull silhouette w/ glacis (slopeW = 42*0.38=15.96) -->
  <path d="M 4 2 Q 4 0 8 0 L 24.04 0 L 38 12.6 L 4 12.6 Z" fill="url(#hull)"/>
  <!-- Glacis facet -->
  <path d="M 24.04 0 L 38 12.6 L 31.616 12.6 L 15.262 0 Z" fill="#121214"/>

  <!-- Urban camo (blocky rectangles) -->
  <g opacity="0.55" fill="#2e2e30">
    <rect x="6" y="2" width="3" height="2.5"/>
    <rect x="10.5" y="3" width="3.5" height="2"/>
    <rect x="15" y="2" width="3" height="2.5"/>
    <rect x="6" y="5.5" width="2.5" height="2"/>
    <rect x="11" y="6" width="3" height="2.5"/>
    <rect x="16" y="6" width="3.5" height="2"/>
    <rect x="6" y="9" width="3" height="2"/>
    <rect x="11" y="9.5" width="3" height="2"/>
    <rect x="20" y="9" width="2.5" height="2"/>
  </g>

  <!-- Top highlight + bottom shadow + seam + accent + rivets -->
  <rect x="6" y="0" width="18.04" height="0.252" fill="#28282b"/>
  <rect x="4" y="10.6" width="34" height="2" fill="rgba(0,0,0,0.45)"/>
  <rect x="6" y="5.67" width="18.04" height="0.21" fill="rgba(0,0,0,0.35)"/>
  <rect x="8" y="7.812" width="14.04" height="0.336" fill="#8a1a1a"/>
  <rect x="8" y="8.148" width="14.04" height="0.126" fill="rgba(0,0,0,0.35)"/>
  <g fill="rgba(0,0,0,0.55)">
    <rect x="10" y="2" width="0.336" height="0.336"/>
    <rect x="18" y="2" width="0.336" height="0.336"/>
    <rect x="10" y="7.67" width="0.302" height="0.302"/>
    <rect x="18" y="7.67" width="0.302" height="0.302"/>
  </g>

  <!-- Hatch -->
  <circle cx="17.64" cy="2.772" r="2" fill="rgba(0,0,0,0.4)"/>
  <circle cx="17.64" cy="2.772" r="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.15"/>

  <!-- Antenna -->
  <line x1="10" y1="0" x2="10" y2="-5.67" stroke="#0a0a10" stroke-width="0.336"/>

  <!-- Stowage -->
  <rect x="4" y="4" width="6" height="6.93" fill="rgba(55,50,40,0.9)"/>
  <rect x="4" y="4" width="6" height="6.93" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
  <rect x="4" y="7.465" width="6" height="0.8" fill="rgba(0,0,0,0.5)"/>

  <!-- Tall turret (stacked tiers, baseY=3.36) -->
  <path d="M 12.6 3.36
           L 12.6 -2.016
           L 14.367 -2.016
           L 14.367 -7.123
           L 16.266 -7.123
           L 16.266 -10.886
           L 20.734 -10.886
           L 20.734 -7.123
           L 22.633 -7.123
           L 22.633 -2.016
           L 24.4 -2.016
           L 24.4 3.36 Z"
        fill="url(#turret)"/>

  <!-- Tall turret bands -->
  <g fill="rgba(0,0,0,0.45)">
    <rect x="14.6" y="-7.064" width="7.76" height="1"/>
    <rect x="14.6" y="-3.704" width="7.76" height="1"/>
    <rect x="14.6" y="-0.344" width="7.76" height="1"/>
  </g>
  <!-- Top stack rod -->
  <line x1="18.5" y1="-10.08" x2="18.5" y2="-16.8" stroke="#0a0a10" stroke-width="0.252"/>

  <!-- Turret highlight + base shadow -->
  <ellipse cx="16.716" cy="-6.048" rx="3.293" ry="3.36" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="18.48" cy="1.344" rx="4.469" ry="2.419" fill="rgba(0,0,0,0.35)"/>

  <!-- Periscope -->
  <rect x="17.24" y="-9.67" width="2.52" height="0.924" fill="rgba(15,16,22,0.95)"/>
  <rect x="17.66" y="-8.67" width="1.68" height="0.294" fill="rgba(130,170,220,0.75)"/>

  <!-- Side mount -->
  <rect x="22.4528" y="-4.032" width="1.344" height="1.26" fill="rgba(22,22,28,0.95)"/>
</svg>
