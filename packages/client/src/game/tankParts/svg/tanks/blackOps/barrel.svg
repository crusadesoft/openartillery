<!--
  "Rail" barrel sprite — long thin tube with energy bands and muzzle glow.
  Pivot at (0, 0). refW=48. barrelLen=34.56, barrelThick=1.536.
  No muzzle brake (rail returns before muzzle code in canvas);
  glow + bands replace it.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-1 -3 36.5 6"
     width="182.5" height="30">
  <defs>
    <linearGradient id="g" x1="0" y1="-0.768" x2="0" y2="0.768" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#3d4356"/>
      <stop offset="0.5" stop-color="#181a22"/>
      <stop offset="1"   stop-color="#070810"/>
    </linearGradient>
  </defs>
  <rect x="-0.48" y="-2.768" width="1.68" height="5.536" fill="#15171e"/>
  <rect x="-0.48" y="-0.768" width="1.68" height="1.536" fill="#2a2e3a"/>
  <rect x="0" y="-0.768" width="34.56" height="1.536" fill="url(#g)"/>
  <rect x="2" y="0.232" width="30.56" height="0.6" fill="rgba(255,255,255,0.2)"/>
  <rect x="15.552" y="-0.768" width="1" height="1.536" fill="rgba(0,0,0,0.45)"/>

  <!-- Energy bands at i=0.25, 0.43, 0.61, 0.79, 0.97 of the barrel length -->
  <rect x="8.64"  y="-1.268" width="1.5" height="2.536" fill="rgba(255,200,120,0.65)"/>
  <rect x="14.86" y="-1.268" width="1.5" height="2.536" fill="rgba(255,200,120,0.65)"/>
  <rect x="21.08" y="-1.268" width="1.5" height="2.536" fill="rgba(255,200,120,0.65)"/>
  <rect x="27.30" y="-1.268" width="1.5" height="2.536" fill="rgba(255,200,120,0.65)"/>
  <rect x="33.52" y="-1.268" width="1.5" height="2.536" fill="rgba(255,200,120,0.65)"/>

  <!-- Muzzle glow (electric blue) -->
  <rect x="31.56" y="-0.538" width="3" height="1.075" fill="rgba(120,200,255,0.85)"/>
  <rect x="32.56" y="-0.307" width="2" height="0.614" fill="rgba(255,255,255,0.7)"/>
</svg>
