<!--
  "Standard" barrel — fully-painted sprite for `barrelStyle: "standard"`.

  Coordinate system: the breech pivot is at (0, 0). +x extends toward
  the muzzle. The barrel center-line is y=0. The barrel is authored at
  refW=48 (hull-width units) so 1 SVG unit ≈ 1 canvas px when drawn at
  native scale; the renderer scales by W/48.

  ViewBox: x∈[-1, 23], y∈[-3.5, 3.5]. Pivot at (0, 0). Designers can
  swap the entire silhouette without touching code; one SVG per barrel
  style. Barrels are not recolored per-tank, so all colors are baked.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-1 -3.5 24 7"
     width="120" height="35">
  <defs>
    <linearGradient id="barrelGrad" x1="0" y1="-1.2" x2="0" y2="1.2" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#2d313e"/>
      <stop offset="0.5" stop-color="#181a22"/>
      <stop offset="1"   stop-color="#070810"/>
    </linearGradient>
  </defs>

  <!-- Breech mount — outer (extends above/below the tube) -->
  <rect x="-0.48" y="-3.2" width="1.68" height="6.4" fill="#15171e"/>
  <!-- Breech mount — inner band level with the tube -->
  <rect x="-0.48" y="-1.2" width="1.68" height="2.4" fill="#2a2e3a"/>

  <!-- Main barrel tube -->
  <rect x="0" y="-1.2" width="22.08" height="2.4" fill="url(#barrelGrad)"/>

  <!-- Top sheen highlight -->
  <rect x="2" y="-0.2" width="18.08" height="0.6" fill="rgba(255,255,255,0.2)"/>

  <!-- Mid-barrel reinforcement band -->
  <rect x="9.936" y="-1.2" width="1" height="2.4" fill="rgba(0,0,0,0.45)"/>

  <!-- Muzzle brake block -->
  <rect x="16.08" y="-2.2" width="6" height="4.4" fill="#2b2f3c"/>

  <!-- Muzzle top highlight -->
  <rect x="16.08" y="-1.2" width="6" height="1" fill="rgba(255,255,255,0.28)"/>

  <!-- Muzzle vents -->
  <rect x="17.28" y="-0.2" width="1" height="0.4" fill="#0a0b10"/>
  <rect x="19.38" y="-0.2" width="1" height="0.4" fill="#0a0b10"/>

  <!-- Bore (muzzle opening) -->
  <rect x="20.08" y="-0.8" width="2" height="1.6" fill="#000000"/>
</svg>
