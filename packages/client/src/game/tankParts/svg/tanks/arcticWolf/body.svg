<!--
  "Arctic Wolf" tank — siege hull (W=54, glacis + skirt, 7 wheels) + wedge turret.
  White #dce4ec with splinter camo, dark blue accent.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 -10 54 38.52"
     width="270" height="192">
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="20.52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#dce4ec"/>
      <stop offset="1" stop-color="#797d81"/>
    </linearGradient>
    <linearGradient id="turret" x1="0" y1="-8.91" x2="0" y2="2.97" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#edf6ff"/>
      <stop offset="1" stop-color="#797d81"/>
    </linearGradient>
    <radialGradient id="wheel" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#6a6e7a"/>
      <stop offset="0.7" stop-color="#3a3d47"/>
      <stop offset="1" stop-color="#14161c"/>
    </radialGradient>
  </defs>

  <!-- Treads -->
  <rect x="0" y="20.52" width="54" height="8" fill="#0b0c10"/>
  <g fill="#1c1e26">
    <rect x="2"  y="22.52" width="2" height="4"/><rect x="6"  y="22.52" width="2" height="4"/>
    <rect x="10" y="22.52" width="2" height="4"/><rect x="14" y="22.52" width="2" height="4"/>
    <rect x="18" y="22.52" width="2" height="4"/><rect x="22" y="22.52" width="2" height="4"/>
    <rect x="26" y="22.52" width="2" height="4"/><rect x="30" y="22.52" width="2" height="4"/>
    <rect x="34" y="22.52" width="2" height="4"/><rect x="38" y="22.52" width="2" height="4"/>
    <rect x="42" y="22.52" width="2" height="4"/><rect x="46" y="22.52" width="2" height="4"/>
    <rect x="50" y="22.52" width="2" height="4"/>
  </g>
  <rect x="0" y="26.52" width="54" height="2" fill="rgba(0,0,0,0.6)"/>
  <rect x="4" y="21.52" width="46" height="1" fill="rgba(255,255,255,0.18)"/>

  <!-- Wheels (7) -->
  <g><circle cx="4.32"  cy="24.52" r="3.6" fill="url(#wheel)"/>
     <circle cx="11.88" cy="24.52" r="3.6" fill="url(#wheel)"/>
     <circle cx="19.44" cy="24.52" r="3.6" fill="url(#wheel)"/>
     <circle cx="27"    cy="24.52" r="3.6" fill="url(#wheel)"/>
     <circle cx="34.56" cy="24.52" r="3.6" fill="url(#wheel)"/>
     <circle cx="42.12" cy="24.52" r="3.6" fill="url(#wheel)"/>
     <circle cx="49.68" cy="24.52" r="3.6" fill="url(#wheel)"/></g>
  <g fill="#0a0b10">
    <circle cx="4.32"  cy="24.52" r="1.62"/><circle cx="11.88" cy="24.52" r="1.62"/>
    <circle cx="19.44" cy="24.52" r="1.62"/><circle cx="27"    cy="24.52" r="1.62"/>
    <circle cx="34.56" cy="24.52" r="1.62"/><circle cx="42.12" cy="24.52" r="1.62"/>
    <circle cx="49.68" cy="24.52" r="1.62"/>
  </g>
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="3.6"   cy="23.8" r="0.648"/><circle cx="11.16" cy="23.8" r="0.648"/>
    <circle cx="18.72" cy="23.8" r="0.648"/><circle cx="26.28" cy="23.8" r="0.648"/>
    <circle cx="33.84" cy="23.8" r="0.648"/><circle cx="41.4"  cy="23.8" r="0.648"/>
    <circle cx="48.96" cy="23.8" r="0.648"/>
  </g>

  <!-- Skirt -->
  <rect x="2" y="18.12" width="50" height="3.36" fill="#dce4ec"/>
  <rect x="2" y="21.52" width="50" height="1" fill="rgba(0,0,0,0.35)"/>
  <g fill="rgba(0,0,0,0.55)">
    <rect x="6"  y="18.76" width="1.4" height="1.4"/>
    <rect x="18" y="18.76" width="1.4" height="1.4"/>
    <rect x="30" y="18.76" width="1.4" height="1.4"/>
    <rect x="42" y="18.76" width="1.4" height="1.4"/>
  </g>

  <!-- Hull silhouette w/ glacis (slopeW = 54*0.20=10.8) -->
  <path d="M 4 2 Q 4 0 8 0 L 41.2 0 L 50 20.52 L 4 20.52 Z" fill="url(#hull)"/>
  <!-- Glacis facet -->
  <path d="M 41.2 0 L 50 20.52 L 45.68 20.52 L 36.26 0 Z" fill="#9ea4a9"/>

  <!-- Splinter pattern (jagged shards) -->
  <g opacity="0.55" fill="#6e7e90">
    <polygon points="6,4 11,3 12,7 7,8"/>
    <polygon points="14,2 19,4 18,9 13,7"/>
    <polygon points="22,5 28,3 29,8 23,10"/>
    <polygon points="9,12 14,14 13,18 8,16"/>
    <polygon points="20,13 26,15 24,19 19,17"/>
    <polygon points="32,4 37,6 36,11 31,9"/>
    <polygon points="29,14 35,16 34,19 28,18"/>
  </g>

  <!-- Top highlight + bottom shadow + seam + accent + rivets -->
  <rect x="6" y="0" width="35.2" height="0.36" fill="#ffffff"/>
  <rect x="4" y="18.52" width="46" height="2" fill="rgba(0,0,0,0.45)"/>
  <rect x="6" y="9.234" width="35.2" height="0.27" fill="rgba(0,0,0,0.35)"/>
  <rect x="8" y="12.72" width="31.2" height="0.43" fill="#1f2b3a"/>
  <rect x="8" y="13.15" width="31.2" height="0.16" fill="rgba(0,0,0,0.35)"/>
  <g fill="rgba(0,0,0,0.55)">
    <rect x="10" y="2" width="0.43" height="0.43"/>
    <rect x="18" y="2" width="0.43" height="0.43"/>
    <rect x="26" y="2" width="0.43" height="0.43"/>
    <rect x="34" y="2" width="0.43" height="0.43"/>
    <rect x="10" y="11.234" width="0.39" height="0.39"/>
    <rect x="18" y="11.234" width="0.39" height="0.39"/>
    <rect x="26" y="11.234" width="0.39" height="0.39"/>
    <rect x="34" y="11.234" width="0.39" height="0.39"/>
  </g>

  <!-- Hatch -->
  <circle cx="22.68" cy="4.52" r="2" fill="rgba(0,0,0,0.4)"/>
  <circle cx="22.68" cy="4.52" r="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.19"/>

  <!-- Antenna -->
  <line x1="10" y1="0" x2="10" y2="-9.234" stroke="#0a0a10" stroke-width="0.43"/>

  <!-- Stowage -->
  <rect x="4" y="4" width="6" height="11.286" fill="rgba(55,50,40,0.9)"/>
  <rect x="4" y="4" width="6" height="11.286" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
  <rect x="4" y="9.643" width="6" height="0.8" fill="rgba(0,0,0,0.5)"/>

  <!-- Wedge turret -->
  <path d="M 13.5 -6.534 L 25.812 -8.91 L 34.02 -4.752 L 34.02 -1.188 L 25.812 2.97 L 13.5 0.594 Z"
        fill="url(#turret)"/>

  <!-- Turret highlight + base shadow + bolts -->
  <ellipse cx="20.68" cy="-5.342" rx="5.7456" ry="2.97" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="23.76" cy="1.1583" rx="7.7976" ry="2.1384" fill="rgba(0,0,0,0.35)"/>
  <g fill="rgba(0,0,0,0.55)">
    <circle cx="30.06" cy="-2.97" r="0.35"/>
    <circle cx="28.85" cy="-0.11" r="0.35"/>
    <circle cx="25.66" cy="1.7" r="0.35"/>
    <circle cx="21.86" cy="1.7" r="0.35"/>
    <circle cx="18.67" cy="-0.11" r="0.35"/>
    <circle cx="17.46" cy="-2.97" r="0.35"/>
    <circle cx="18.67" cy="-5.83" r="0.35"/>
    <circle cx="21.86" cy="-7.64" r="0.35"/>
    <circle cx="25.66" cy="-7.64" r="0.35"/>
    <circle cx="28.85" cy="-5.83" r="0.35"/>
  </g>

  <!-- Periscope -->
  <rect x="22.14" y="-8.316" width="3.24" height="1.188" fill="rgba(15,16,22,0.95)"/>
  <rect x="22.68" y="-7.316" width="2.16" height="0.378" fill="rgba(130,170,220,0.75)"/>

  <!-- Side mount -->
  <rect x="30.3264" y="-3.834" width="1.728" height="1.62" fill="rgba(22,22,28,0.95)"/>
</svg>
