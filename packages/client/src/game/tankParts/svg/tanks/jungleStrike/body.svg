<!--
  "Jungle Strike" tank — bunker hull (W=46, glacis + skirt, 6 wheels) + low turret.
  Olive #3a4a22 with tiger camo, brown accent.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 -10 46 37.32"
     width="230" height="187">
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="19.32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4e642e"/>
      <stop offset="0.55" stop-color="#3a4a22"/>
      <stop offset="1" stop-color="#202912"/>
    </linearGradient>
    <linearGradient id="turret" x1="0" y1="-3.864" x2="0" y2="2.576" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#546b31"/>
      <stop offset="0.6" stop-color="#3e5024"/>
      <stop offset="1" stop-color="#202912"/>
    </linearGradient>
    <radialGradient id="wheel" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#6a6e7a"/>
      <stop offset="0.7" stop-color="#3a3d47"/>
      <stop offset="1" stop-color="#14161c"/>
    </radialGradient>
  </defs>

  <!-- Treads -->
  <rect x="0" y="19.32" width="46" height="8" fill="#0b0c10"/>
  <g fill="#1c1e26">
    <rect x="2"  y="21.32" width="2" height="4"/><rect x="6"  y="21.32" width="2" height="4"/>
    <rect x="10" y="21.32" width="2" height="4"/><rect x="14" y="21.32" width="2" height="4"/>
    <rect x="18" y="21.32" width="2" height="4"/><rect x="22" y="21.32" width="2" height="4"/>
    <rect x="26" y="21.32" width="2" height="4"/><rect x="30" y="21.32" width="2" height="4"/>
    <rect x="34" y="21.32" width="2" height="4"/><rect x="38" y="21.32" width="2" height="4"/>
    <rect x="42" y="21.32" width="2" height="4"/>
  </g>
  <rect x="0" y="25.32" width="46" height="2" fill="rgba(0,0,0,0.6)"/>
  <rect x="4" y="20.32" width="38" height="1" fill="rgba(255,255,255,0.18)"/>

  <!-- Wheels (6) -->
  <g><circle cx="3.68"  cy="23.32" r="3.6" fill="url(#wheel)"/>
     <circle cx="11.41" cy="23.32" r="3.6" fill="url(#wheel)"/>
     <circle cx="19.13" cy="23.32" r="3.6" fill="url(#wheel)"/>
     <circle cx="26.86" cy="23.32" r="3.6" fill="url(#wheel)"/>
     <circle cx="34.59" cy="23.32" r="3.6" fill="url(#wheel)"/>
     <circle cx="42.32" cy="23.32" r="3.6" fill="url(#wheel)"/></g>
  <g fill="#0a0b10">
    <circle cx="3.68"  cy="23.32" r="1.62"/><circle cx="11.41" cy="23.32" r="1.62"/>
    <circle cx="19.13" cy="23.32" r="1.62"/><circle cx="26.86" cy="23.32" r="1.62"/>
    <circle cx="34.59" cy="23.32" r="1.62"/><circle cx="42.32" cy="23.32" r="1.62"/>
  </g>
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="2.96"  cy="22.6" r="0.648"/><circle cx="10.69" cy="22.6" r="0.648"/>
    <circle cx="18.41" cy="22.6" r="0.648"/><circle cx="26.14" cy="22.6" r="0.648"/>
    <circle cx="33.87" cy="22.6" r="0.648"/><circle cx="41.6"  cy="22.6" r="0.648"/>
  </g>

  <!-- Skirt -->
  <rect x="2" y="16.92" width="42" height="3.36" fill="#3a4a22"/>
  <rect x="2" y="20.32" width="42" height="1" fill="rgba(0,0,0,0.35)"/>
  <g fill="rgba(0,0,0,0.55)">
    <rect x="6"  y="17.56" width="1.4" height="1.4"/>
    <rect x="18" y="17.56" width="1.4" height="1.4"/>
    <rect x="30" y="17.56" width="1.4" height="1.4"/>
    <rect x="38" y="17.56" width="1.4" height="1.4"/>
  </g>

  <!-- Hull silhouette w/ glacis (slopeW = 46*0.06=2.76) -->
  <path d="M 4 2 Q 4 0 8 0 L 41.24 0 L 42 19.32 L 4 19.32 Z" fill="url(#hull)"/>
  <!-- Glacis facet -->
  <path d="M 41.24 0 L 42 19.32 L 40.896 19.32 L 39.722 0 Z" fill="#293518"/>

  <!-- Tiger pattern (vertical brush strokes) -->
  <g opacity="0.55" fill="#1f2a14">
    <path d="M 6 1 Q 7.84 9.66 7.36 17 L 9.68 17 Q 9.84 9.66 8 1 Z"/>
    <path d="M 14 1 Q 15.84 9.66 15.36 17 L 17.68 17 Q 17.84 9.66 16 1 Z"/>
    <path d="M 22 1 Q 23.84 9.66 23.36 17 L 25.68 17 Q 25.84 9.66 24 1 Z"/>
    <path d="M 30 1 Q 31.84 9.66 31.36 17 L 33.68 17 Q 33.84 9.66 32 1 Z"/>
    <path d="M 38 1 Q 39.84 9.66 39.36 17 L 41.6 17 Q 41.84 9.66 40 1 Z"/>
  </g>

  <!-- Top highlight + bottom shadow + seam + accent + rivets -->
  <rect x="6" y="0" width="35.24" height="0.34" fill="#5a7335"/>
  <rect x="4" y="17.32" width="38" height="2" fill="rgba(0,0,0,0.45)"/>
  <rect x="6" y="8.694" width="35.24" height="0.25" fill="rgba(0,0,0,0.35)"/>
  <rect x="8" y="11.978" width="31.24" height="0.4" fill="#6b3d1a"/>
  <rect x="8" y="12.378" width="31.24" height="0.15" fill="rgba(0,0,0,0.35)"/>
  <g fill="rgba(0,0,0,0.55)">
    <rect x="10" y="2" width="0.4" height="0.4"/>
    <rect x="18" y="2" width="0.4" height="0.4"/>
    <rect x="26" y="2" width="0.4" height="0.4"/>
    <rect x="34" y="2" width="0.4" height="0.4"/>
    <rect x="10" y="10.694" width="0.36" height="0.36"/>
    <rect x="18" y="10.694" width="0.36" height="0.36"/>
    <rect x="26" y="10.694" width="0.36" height="0.36"/>
    <rect x="34" y="10.694" width="0.36" height="0.36"/>
  </g>

  <!-- Hatch -->
  <circle cx="19.32" cy="4.25" r="2" fill="rgba(0,0,0,0.4)"/>
  <circle cx="19.32" cy="4.25" r="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.16"/>

  <!-- Antenna -->
  <line x1="10" y1="0" x2="10" y2="-8.694" stroke="#0a0a10" stroke-width="0.37"/>

  <!-- Stowage -->
  <rect x="4" y="4" width="6" height="10.626" fill="rgba(55,50,40,0.9)"/>
  <rect x="4" y="4" width="6" height="10.626" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.55"/>
  <rect x="4" y="9.313" width="6" height="0.8" fill="rgba(0,0,0,0.5)"/>

  <!-- Low turret (squat ellipse) -->
  <ellipse cx="20.24" cy="-0.644" rx="9.66" ry="3.22" fill="url(#turret)"/>

  <!-- Turret highlight + base shadow + bolts (10 around) -->
  <ellipse cx="17.34" cy="-1.932" rx="5.4096" ry="1.61" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="20.24" cy="1.6772" rx="7.3416" ry="1.1592" fill="rgba(0,0,0,0.35)"/>
  <g fill="rgba(0,0,0,0.55)">
    <circle cx="26.83" cy="-0.644" r="0.32"/>
    <circle cx="26.07" cy="1.0117" r="0.32"/>
    <circle cx="24.07" cy="2.0356" r="0.32"/>
    <circle cx="21.59" cy="2.0356" r="0.32"/>
    <circle cx="19.59" cy="1.0117" r="0.32"/>
    <circle cx="13.65" cy="-0.644" r="0.32"/>
    <circle cx="14.41" cy="-2.3" r="0.32"/>
    <circle cx="16.41" cy="-3.323" r="0.32"/>
    <circle cx="24.07" cy="-3.323" r="0.32"/>
    <circle cx="26.07" cy="-2.3" r="0.32"/>
  </g>

  <!-- Periscope -->
  <rect x="18.86" y="-2.989" width="2.76" height="1.012" fill="rgba(15,16,22,0.95)"/>
  <rect x="19.32" y="-1.989" width="1.84" height="0.322" fill="rgba(130,170,220,0.75)"/>

  <!-- Side mount -->
  <rect x="23.331" y="-1.38" width="1.472" height="1.38" fill="rgba(22,22,28,0.95)"/>
</svg>
