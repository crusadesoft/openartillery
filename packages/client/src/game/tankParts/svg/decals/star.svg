  <path d="M 0 -1 L 0.2645 -0.3641 L 0.9511 -0.3090 L 0.4280 0.1391 L 0.5878 0.8090 L 0 0.45 L -0.5878 0.8090 L -0.4280 0.1391 L -0.9511 -0.3090 L -0.2645 -0.3641 Z"
        fill="rgba(240,234,220,0.92)"
        stroke="rgba(0,0,0,0.7)"
