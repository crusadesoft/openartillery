name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: artillery
          POSTGRES_PASSWORD: artillery
          POSTGRES_DB: artillery
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U artillery"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://artillery:artillery@localhost:5432/artillery
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET || 'ci-access-secret-32chars-minimum-______' }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-refresh-secret-32chars-minimum-_____' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run build:shared
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run db:migrate
      - run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: false
          tags: artillery/server:${{ github.sha }}
